# Database Configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/locator;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file

# Test Database Configuration
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:locator_test;DB_CLOSE_DELAY=-1

# OpenAPI & Swagger UI Configuration
quarkus.swagger-ui.always-include=true

# HTTP Host Configuration
quarkus.http.host=0.0.0.0

# OpenStreetMap Nominatim Client Configuration
nominatim_uri/mp-rest/url=https://nominatim.openstreetmap.org

# Open-Meteo Weather Client Configuration
weather_uri/mp-rest/url=https://api.open-meteo.com


%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true
